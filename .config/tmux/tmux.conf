# -- general -------------------------------------------------------------------

# TERM should be screen-* or tmux-*
set -g default-terminal "tmux-256color"

# enable 24-bit color
set -as terminal-overrides ',xterm-256color:RGB'

set -sg repeat-time 600
setw -g mode-keys vi

# don't exit from tmux when closing a session
set -g detach-on-destroy off

# change the default prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# -- display -------------------------------------------------------------------

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g automatic-rename on
set -g set-titles on
set -g set-titles-string '#W/#T'
set -g monitor-activity on
set -g visual-activity off

# -- Keybindings ---------------------------------------------------------------

# Reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

# use v and h for window splitting
unbind %
unbind v
unbind '"'
unbind h
bind v split-window -h -c '#{pane_current_path}'
bind h split-window -v -c '#{pane_current_path}'

# skip "kill-pane 1? (y/n)" prompt
bind-key x kill-pane

set -g mouse on

# list active sessions with fzf
bind-key "T" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# interactively switch window
bind-key "W" run-shell "sesh window \"$(sesh window | fzf-tmux -p 60%,50% --prompt '🪟  ')\""

# switch the attached client back to the last session.
bind -N "last-session (via sesh) " L run-shell "sesh last"

# connect to the root session
bind -N "switch to root session (via sesh) " 9 run-shell "sesh connect --root $(pwd)"

# filter by root of active project
bind-key "R" display-popup -E -w 40% "sesh connect \"$(
  sesh list -i -H | gum filter --value \"$(sesh root)\" --limit 1 --fuzzy --no-sort --placeholder 'Pick a sesh' --prompt='⚡'readme
)\""


# -- copy mode -----------------------------------------------------------------

bind -Tcopy-mode-vi 'v' send-keys -X begin-selection
bind -Tcopy-mode-vi 'y' send-keys -X copy-selection-and-cancel

# -- theme (Refined Oxocarbon) -------------------------------------------------

set -g status-interval 5
set -g status-position bottom

# Solid Background (Ensures no clashing grey blocks)
set -g status-style "bg=#161616,fg=#dde1e6"

# --- Left Side: [Session] / [Folder] ---
set -g status-left-length 50
set -g status-left "#[fg=#3ddbd9,bold,bg=#161616] 󰭦 #S #[fg=#525252] / #[fg=#dde1e6,nobold]󱞞 #{b:pane_current_path} #[fg=#525252] / "

# --- Right Side: [Host] / [Time] ---
set -g status-right-length 60
set -g status-right "#[fg=#525252] / #[fg=#3ddbd9]󰒋 #h #[fg=#525252] / #[fg=#dde1e6]󱑎 %Y-%m-%d %H:%M "

# --- Windows List ---
# Current window: Magenta Icon + Cyan Text
setw -g window-status-current-style "fg=#3ddbd9,bold,bg=#161616"
setw -g window-status-current-format "#[fg=#ee79d1,bg=default] 󰖯 #[fg=#3ddbd9,bold,bg=default]#I:#W#F "

# Inactive windows: Clean grey text, no background block
setw -g window-status-style "fg=#525252,nobold,bg=#161616"
setw -g window-status-format "#[fg=#525252,bg=default,none] 󰖰 #I:#W "

# --- UI Elements ---
set -g pane-border-style "fg=#525252"
set -g pane-active-border-style "fg=#42be65"
set -g message-style "bg=#ee79d1,fg=#161616,bold"

# -- plugins -------------------------------------------------------------------

set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tpm'

# Initialization of TPM (Keep this at the very bottom)
if "test ! -d $XDG_DATA_HOME/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm $XDG_DATA_HOME/tmux/plugins/tpm && $XDG_DATA_HOME/tmux/plugins/tpm/bin/install_plugins'"

run "$XDG_DATA_HOME/tmux/plugins/tpm/tpm"
