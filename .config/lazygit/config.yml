# Config relating to the Lazygit UI
gui:
    # See https://github.com/jesseduffield/lazygit/blob/master/docs/Config.md#custom-branch-color
    branchColorPatterns:
        "^fix/": "#d73a4a"
        "^feat/": "#a2eeef"
        "^task/": "#a2eeef"
        "^build/": "#0075ca"
        "^ci/": "#0075ca"
        "^docs/": "#11aaff"
        "^refactor/": "#e4e669"
        "^perf/": "#ff5733"
        "^test/": "#7057ff"

    # Format used when displaying time e.g. commit time.
    # Uses Go's time format syntax: https://pkg.go.dev/time#Time.Format
    timeFormat: 02 Jan 06

    # Format used when displaying time if the time is less than 24 hours ago.
    # Uses Go's time format syntax: https://pkg.go.dev/time#Time.Format
    shortTimeFormat: 3:04PM

    # Config relating to colors and styles.
    # See https://github.com/jesseduffield/lazygit/blob/master/docs/Config.md#color-attributes
    theme:
        activeBorderColor:
            - "#42be65" # oxocarbon green
            - bold
        inactiveBorderColor:
            - "#393939" # oxocarbon gray
        optionsTextColor:
            - "#78a9ff" # oxocarbon blue
        selectedLineBgColor:
            - "#262626" # oxocarbon slightly lighter bg
        cherryPickedCommitBgColor:
            - "#393939" # oxocarbon gray (mid)
        cherryPickedCommitFgColor:
            - "#be95ff" # oxocarbon purple
        unstagedChangesColor:
            - "#ee5396" # oxocarbon pink
        searchingActiveBorderColor:
            - "#be95ff" # oxocarbon purple
            - bold
        defaultFgColor:
            - "#f2f4f8" # oxocarbon white

    showRandomTip: false

    # Nerd fonts version to use.
    # One of: '2' | '3' | empty string (default)
    # If empty, do not show icons.
    nerdFontsVersion: "3"

    showFileIcons: true

    # Window border style.
    # One of 'rounded' (default) | 'single' | 'double' | 'hidden' | 'bold'
    border: rounded

# Config relating to git
git:
    # Array of pagers. Each entry has the following format:
    #
    #   # Value of the --color arg in the git diff command. Some pagers want
    #   # this to be set to 'always' and some want it set to 'never'
    #   colorArg: "always"
    #
    #   # e.g.
    #   # diff-so-fancy
    #   # delta --dark --paging=never
    #   # ydiff -p cat -s --wrap --width={{columnWidth}}
    #   pager: ""
    #
    #   # e.g. 'difft --color=always'
    #   externalDiffCommand: ""
    #
    #   # If true, Lazygit will use git's `diff.external` config for paging.
    #   # The advantage over `externalDiffCommand` is that this can be
    #   # configured per file type in .gitattributes; see
    #   # https://git-scm.com/docs/gitattributes#_defining_an_external_diff_driver.
    #   useExternalDiffGitConfig: false
    #
    # See https://github.com/jesseduffield/lazygit/blob/master/docs/Custom_Pagers.md
    # for more information.
    pagers:
        - pager: delta --dark --paging=never
          useConfig: false

    # list of branches that are considered 'main' branches, used when displaying
    # commits
    mainBranches:
        - master
        - main

# Config relating to things outside of Lazygit like how files are opened,
# copying to clipboard, etc
os:
    # Command for editing a file. Should contain "{{filename}}".
    edit: "nvim {{filename}}"

    # Command for editing a file at a given line number. Should contain
    # "{{filename}}", and may optionally contain "{{line}}".
    editAtLine: "nvim --line={{line}} {{filename}}"

    # Same as EditAtLine, except that the command needs to wait until the window is
    # closed.
    editAtLineAndWait: ""

    # Whether lazygit suspends until an edit process returns
    editInTerminal: false

    # For opening a directory in an editor
    openDirInEditor: "nvim {{dir}}"

# What to do when opening Lazygit outside of a git repo.
# - 'prompt': (default) ask whether to initialize a new repo or open in the most
# recent repo
# - 'create': initialize a new repo
# - 'skip': open most recent repo
# - 'quit': exit Lazygit
notARepository: prompt
